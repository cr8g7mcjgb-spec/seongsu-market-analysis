name: 성수동 상권 자동 수집

on:
  schedule:
    - cron: '0 * * * *'   # 매시간 수집
  workflow_dispatch:       # 수동 실행도 가능

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 데이터 수집
        env:
          SEOUL_API_KEY: ${{ secrets.SEOUL_API_KEY }}
          SBI_KEY: ${{ secrets.SBI_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python collect_data.py

      - name: 수집 데이터 커밋
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git diff --staged --quiet || git commit -m "자동 수집: $(date '+%Y-%m-%d %H:%M KST')"
          git push

  weekly_report:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 0 * * 1'  # 매주 월요일 9시 KST
    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: Claude 주간 리포트 생성
        env:
          SEOUL_API_KEY: ${{ secrets.SEOUL_API_KEY }}
          SBI_KEY: ${{ secrets.SBI_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python collect_data.py
          python analyze.py

      - name: 리포트 커밋
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add report_*.md
          git diff --staged --quiet || git commit -m "주간 리포트: $(date '+%Y-%m-%d')" 
          git push
